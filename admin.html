<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ - Корочки.есть</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="container">
        <span class="navbar-brand">Корочки.есть</span>
        <div>
            <span class="nav-link" style="display:inline-block;">Админ-панель</span>
            <button class="btn btn-outline-light" onclick="logoutUser()">Выйти</button>
        </div>
    </div>
</nav>

<div class="container my-4">
    <div class="card p-4 mb-4" style="background:var(--dark); color:var(--white);">
        <div class="d-flex justify-content-between">
            <div>
                <h2 style="color:var(--white);">Панель администратора</h2>
                <p class="opacity-75">Управление заявками</p>
            </div>
            <div>
                <span class="badge bg-light text-dark fs-6">
                    Всего заявок: <span id="totalCount">0</span>
                </span>
            </div>
        </div>
    </div>

    <h3 class="section-title">Все заявки</h3>

    <div id="adminList" class="row">
        <!-- Загрузка через JS -->
    </div>
</div>

<footer class="footer">
    <div class="container">
        <p>&copy; 2026 Корочки.есть</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script>
var user = getCurrentUser();
if (!user || user.login !== 'Admin') {
    window.location.href = 'auth.html';
}

function renderApps() {
    var container = document.getElementById('adminList');
    var total = document.getElementById('totalCount');
    
    total.textContent = applications.length;
    
    if (applications.length === 0) {
        container.innerHTML = `
            <div class="col-12">
                <div class="card p-5 text-center">
                    <h4>Нет заявок</h4>
                </div>
            </div>
        `;
        return;
    }
    
    var html = '';
    for (var i = 0; i < applications.length; i++) {
        var app = applications[i];
        var statusClass = 'badge-new';
        if (app.status === 'Идет обучение') statusClass = 'badge-progress';
        if (app.status === 'Обучение завершено') statusClass = 'badge-done';
        
        html += `
            <div class="col-md-4 mb-4">
                <div class="card">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start">
                            <h5>${app.course}</h5>
                            <span class="badge-status ${statusClass}">${app.status}</span>
                        </div>
                        <p class="mt-2"><small>Пользователь: ${app.userLogin}</small></p>
                        <p><small>Дата начала: ${app.startDate}</small></p>
                        <p><span class="badge bg-light">${app.payment}</span></p>
                        ${app.review ? `<p><small>Отзыв: ${app.review}</small></p>` : ''}
                        <div class="mt-3">
                            <label class="small fw-bold">Изменить статус:</label>
                            <select class="form-select form-select-sm" onchange="changeStatus(${app.id}, this.value)">
                                <option value="Новое" ${app.status === 'Новое' ? 'selected' : ''}>Новое</option>
                                <option value="Идет обучение" ${app.status === 'Идет обучение' ? 'selected' : ''}>Идет обучение</option>
                                <option value="Обучение завершено" ${app.status === 'Обучение завершено' ? 'selected' : ''}>Обучение завершено</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }
    container.innerHTML = html;
}

function changeStatus(id, newStatus) {
    if (updateStatus(id, newStatus)) {
        alert('Статус заявки изменен на "' + newStatus + '"');
        renderApps();
    }
}

renderApps();
</script>

</body>
</html>
