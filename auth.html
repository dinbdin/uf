<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Корочки.есть</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="container">
        <span class="navbar-brand">Корочки.есть</span>
    </div>
</nav>

<div class="container">
    <div class="card auth-card">
        <div class="card-body">
            <h2 class="text-center mb-4">Вход в систему</h2>
            
            <div id="errorMsg" class="alert alert-danger" style="display:none;"></div>
            
            <form id="loginForm">
                <div class="mb-3">
                    <label>Логин</label>
                    <input type="text" class="form-control" id="loginInput" required>
                </div>
                <div class="mb-3">
                    <label>Пароль</label>
                    <input type="password" class="form-control" id="passwordInput" required>
                </div>
                <button type="submit" class="btn btn-dark w-100">Войти</button>
            </form>
            
            <hr>
            
            <p class="text-center">
                Нет аккаунта? <a href="registr.html">Регистрация</a>
            </p>
            
            <p class="text-center text-muted small">
                <strong>Тестовые данные:</strong><br>
                Пользователь: user123 / 123456<br>
                Администратор: Admin / KorokNET
            </p>
        </div>
    </div>
</div>

<footer class="footer">
    <div class="container">
        <p>&copy; 2026 Корочки.есть</p>
    </div>
</footer>

<script src="js/main.js"></script>
<script>
var user = getCurrentUser();
if (user) {
    if (user.login === 'Admin') {
        window.location.href = 'admin.html';
    } else {
        window.location.href = 'prozaya.html';
    }
}

document.getElementById('loginForm').onsubmit = function(e) {
    e.preventDefault();
    
    var login = document.getElementById('loginInput').value.trim();
    var password = document.getElementById('passwordInput').value.trim();
    var error = document.getElementById('errorMsg');
    
    error.style.display = 'none';
    
    if (loginUser(login, password)) {
        if (login === 'Admin') {
            window.location.href = 'admin.html';
        } else {
            window.location.href = 'prozaya.html';
        }
    } else {
        error.textContent = 'Неверный логин или пароль';
        error.style.display = 'block';
        setTimeout(function() {
            error.style.display = 'none';
        }, 3000);
    }
};
</script>

</body>
</html>
