<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новая заявка - Корочки.есть</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="container">
        <span class="navbar-brand">Корочки.есть</span>
        <div>
            <a href="prozaya.html" class="nav-link" style="display:inline-block;">Мои заявки</a>
            <a href="crzaya.html" class="nav-link" style="display:inline-block;">Новая заявка</a>
            <button class="btn btn-outline-light" onclick="logoutUser()">Выйти</button>
        </div>
    </div>
</nav>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h2 class="text-center mb-4">Создание заявки</h2>
                    
                    <div id="errorMsg" class="alert alert-danger" style="display:none;"></div>
                    <div id="successMsg" class="alert alert-success" style="display:none;"></div>
                    
                    <form id="appForm">
                        <div class="mb-3">
                            <label>Курс</label>
                            <select class="form-select" id="course" required>
                                <option value="">Выберите курс</option>
                                <option>Графический дизайн</option>
                                <option>Веб-дизайн</option>
                                <option>Motion-дизайн</option>
                                <option>Дизайн интерьеров</option>
                                <option>Промышленный дизайн</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>Дата начала</label>
                            <input type="date" class="form-control" id="startDate" required>
                        </div>
                        <div class="mb-3">
                            <label>Способ оплаты</label>
                            <select class="form-select" id="payment" required>
                                <option value="">Выберите способ</option>
                                <option>Картой</option>
                                <option>Безналичный</option>
                                <option>Наличными</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-dark w-100">Отправить</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="footer">
    <div class="container">
        <p>&copy; 2026 Корочки.есть</p>
    </div>
</footer>

<script src="js/main.js"></script>
<script>
var user = getCurrentUser();
if (!user) {
    window.location.href = 'auth.html';
}
if (user.login === 'Admin') {
    window.location.href = 'admin.html';
}

document.getElementById('appForm').onsubmit = function(e) {
    e.preventDefault();
    
    var course = document.getElementById('course').value;
    var startDate = document.getElementById('startDate').value;
    var payment = document.getElementById('payment').value;
    var error = document.getElementById('errorMsg');
    var success = document.getElementById('successMsg');
    
    error.style.display = 'none';
    success.style.display = 'none';
    
    if (!course || !startDate || !payment) {
        error.textContent = 'Заполните все поля';
        error.style.display = 'block';
        return;
    }
    
    if (addApplication(user.login, course, startDate, payment)) {
        success.textContent = 'Заявка создана!';
        success.style.display = 'block';
        document.getElementById('appForm').reset();
        setTimeout(function() {
            window.location.href = 'prozaya.html';
        }, 1500);
    }
};
</script>

</body>
</html>
</html>
