<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Корочки.есть</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="container">
        <span class="navbar-brand">Корочки.есть</span>
    </div>
</nav>

<div class="container">
    <div class="card auth-card">
        <div class="card-body">
            <h2 class="text-center mb-4">Регистрация</h2>
            
            <div id="errorMsg" class="alert alert-danger" style="display:none;"></div>
            <div id="successMsg" class="alert alert-success" style="display:none;"></div>
            
            <form id="regForm">
                <div class="mb-3">
                    <label>Логин (латиница, цифры, >=6 символов)</label>
                    <input type="text" class="form-control" id="regLogin" required>
                </div>
                <div class="mb-3">
                    <label>Пароль (>=8 символов)</label>
                    <input type="password" class="form-control" id="regPassword" required>
                </div>
                <div class="mb-3">
                    <label>ФИО (кириллица)</label>
                    <input type="text" class="form-control" id="regFio" required>
                </div>
                <div class="mb-3">
                    <label>Телефон 8(XXX)XXX-XX-XX</label>
                    <input type="text" class="form-control" id="regPhone" placeholder="8(999)999-99-99" required>
                </div>
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" class="form-control" id="regEmail" required>
                </div>
                <button type="submit" class="btn btn-dark w-100">Зарегистрироваться</button>
            </form>
            
            <hr>
            
            <p class="text-center">
                Уже есть аккаунт? <a href="auth.html">Войти</a>
            </p>
        </div>
    </div>
</div>

<footer class="footer">
    <div class="container">
        <p>&copy; 2026 Корочки.есть</p>
    </div>
</footer>

<script src="js/main.js"></script>
<script>
document.getElementById('regForm').onsubmit = function(e) {
    e.preventDefault();
    
    var login = document.getElementById('regLogin').value.trim();
    var password = document.getElementById('regPassword').value.trim();
    var fio = document.getElementById('regFio').value.trim();
    var phone = document.getElementById('regPhone').value.trim();
    var email = document.getElementById('regEmail').value.trim();
    
    var error = document.getElementById('errorMsg');
    var success = document.getElementById('successMsg');
    
    error.style.display = 'none';
    success.style.display = 'none';
    
    if (!validLogin(login)) {
        error.textContent = 'Логин должен содержать латиницу и цифры, не менее 6 символов';
        error.style.display = 'block';
        return;
    }
    
    if (!validPassword(password)) {
        error.textContent = 'Пароль должен быть не менее 8 символов';
        error.style.display = 'block';
        return;
    }
    
    if (!validFio(fio)) {
        error.textContent = 'ФИО должно содержать только кириллицу и пробелы';
        error.style.display = 'block';
        return;
    }
    
    if (!validPhone(phone)) {
        error.textContent = 'Телефон должен быть в формате 8(XXX)XXX-XX-XX';
        error.style.display = 'block';
        return;
    }
    
    if (!validEmail(email)) {
        error.textContent = 'Введите корректный email';
        error.style.display = 'block';
        return;
    }
    
    if (registerUser(login, password, fio, phone, email)) {
        success.textContent = 'Регистрация успешна!';
        success.style.display = 'block';
        document.getElementById('regForm').reset();
        setTimeout(function() {
            window.location.href = 'auth.html';
        }, 2000);
    } else {
        error.textContent = 'Пользователь с таким логином уже существует';
        error.style.display = 'block';
    }
};
</script>

</body>
</html>
