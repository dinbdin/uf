<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои заявки - Корочки.есть</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="container">
        <span class="navbar-brand">Корочки.есть</span>
        <div>
            <a href="prozaya.html" class="nav-link" style="display:inline-block;">Мои заявки</a>
            <a href="crzaya.html" class="nav-link" style="display:inline-block;">Новая заявка</a>
            <button class="btn btn-outline-light" onclick="logoutUser()">Выйти</button>
        </div>
    </div>
</nav>

<div class="container my-4">

    <!-- Слайдер -->
    <div id="slider" class="carousel slide mb-5" data-bs-ride="carousel">
        <div class="carousel-indicators">
            <button data-bs-target="#slider" data-bs-slide-to="0" class="active"></button>
            <button data-bs-target="#slider" data-bs-slide-to="1"></button>
            <button data-bs-target="#slider" data-bs-slide-to="2"></button>
        </div>
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="images/slider1.jpg" class="d-block w-100 slider-img" alt="Дизайн">
                <div class="carousel-caption">
                    <h3>Дизайн интерьеров</h3>
                    <p>Создавайте уникальные пространства</p>
                </div>
            </div>
            <div class="carousel-item">
                <img src="images/slider2.jpg" class="d-block w-100 slider-img" alt="Графика">
                <div class="carousel-caption">
                    <h3>Графический дизайн</h3>
                    <p>Визуальная коммуникация</p>
                </div>
            </div>
            <div class="carousel-item">
                <img src="images/slider3.jpg" class="d-block w-100 slider-img" alt="UI/UX">
                <div class="carousel-caption">
                    <h3>UX/UI дизайн</h3>
                    <p>Создание удобных интерфейсов</p>
                </div>
            </div>
        </div>
        <button class="carousel-control-prev" data-bs-target="#slider" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" data-bs-target="#slider" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>

    <h2 class="section-title">Мои заявки</h2>

    <div id="appsList" class="row">
        <!-- Загрузка через JS -->
    </div>
</div>

<footer class="footer">
    <div class="container">
        <p>&copy; 2026 Корочки.есть</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script>
// Проверка авторизации
var user = getCurrentUser();
if (!user) {
    window.location.href = 'auth.html';
}
if (user.login === 'Admin') {
    window.location.href = 'admin.html';
}

// Показать заявки
var apps = getUserApps(user.login);
var container = document.getElementById('appsList');

if (apps.length === 0) {
    container.innerHTML = `
        <div class="col-12">
            <div class="card p-5 text-center">
                <h4>У вас нет заявок</h4>
                <a href="crzaya.html" class="btn btn-dark">Создать заявку</a>
            </div>
        </div>
    `;
} else {
    var html = '';
    for (var i = 0; i < apps.length; i++) {
        var app = apps[i];
        var statusClass = 'badge-new';
        if (app.status === 'Идет обучение') statusClass = 'badge-progress';
        if (app.status === 'Обучение завершено') statusClass = 'badge-done';
        
        html += `
            <div class="col-md-4 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5>${app.course}</h5>
                        <p><small>${app.startDate}</small></p>
                        <p><span class="badge bg-light">${app.payment}</span></p>
                        <p><span class="badge-status ${statusClass}">${app.status}</span></p>
                        ${app.review ? `<p><small>Отзыв: ${app.review}</small></p>` : 
                         `<button class="btn btn-sm btn-outline-dark mt-2" onclick="addReviewFunc(${app.id})">Оставить отзыв</button>`}
                    </div>
                </div>
            </div>
        `;
    }
    container.innerHTML = html;
}

function addReviewFunc(id) {
    var text = prompt('Напишите отзыв:');
    if (text && text.trim()) {
        if (addReviewToApp(id, text.trim())) {
            alert('Отзыв добавлен!');
            location.reload();
        }
    }
}
</script>

</body>
</html>
